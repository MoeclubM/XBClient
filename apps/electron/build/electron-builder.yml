appId: moe.telecom.xbclient
productName: XBClient
copyright: Copyright © PassClient
artifactName: XBClient-${version}-${os}-${arch}.${ext}
asar: true
npmRebuild: false
directories:
  output: dist
  buildResources: build
files:
  - bootstrap.mjs
  - main.mjs
  - preload.cjs
  - updater.mjs
  - package.json
extraResources:
  - from: build/icon.png
    to: icon.png
  - from: ../../web/dist
    to: web/dist
  - from: ../../rust/electron-backend/target/release
    to: bin
    filter:
      - xbclient-electron-backend*
  - from: ../../rust/aerion-core/assets/route
    to: route
  - from: resources/config
    to: config
    filter:
      - local.properties
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  executableName: XBClient
  requestedExecutionLevel: requireAdministrator
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ${productName}
  runAfterFinish: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  differentialPackage: true
  deleteAppDataOnUninstall: false
portable:
  artifactName: XBClient-${version}-portable-${os}-${arch}.${ext}
linux:
  target:
    - deb
  icon: build/icon.png
  category: Network
  executableName: XBClient
  executableArgs:
    - --enable-features=UseOzonePlatform
    - --ozone-platform-hint=auto
  desktop:
    entry:
      Name: XBClient
      Comment: XBClient proxy client
      Categories: Network;
      StartupWMClass: XBClient
  maintainer: PassClient
  synopsis: XBClient proxy client
  description: Desktop client for PassClient (Wayland-first on GNOME/KDE).
deb:
  depends:
    - gsettings-desktop-schemas
    - libgtk-3-0
    - libnotify4
    - libayatana-appindicator3-1 | libappindicator3-1

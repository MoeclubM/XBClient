name: Desktop

run-name: Desktop · ${{ github.head_ref || github.ref_name }} · @${{ github.actor }} · #${{ github.run_number }}

on:
  push:
    branches:
      - '**'
    paths:
      - 'apps/desktop/**'
      - 'web/**'
      - 'rust/**'
      - '.github/workflows/desktop.yml'
      - 'pnpm-workspace.yaml'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-windows-${{ hashFiles('apps/desktop/src-tauri/Cargo.toml', 'rust/aerion-core/Cargo.toml') }}
          restore-keys: cargo-windows-

      - name: Install web deps
        shell: bash
        run: |
          pnpm install --frozen-lockfile=false

      - name: Type-check web
        shell: bash
        run: |
          pnpm --filter xbclient-web typecheck

      - name: Build web
        shell: bash
        run: |
          pnpm --filter xbclient-web build

      - name: Cargo check (Tauri)
        shell: bash
        run: |
          cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --release

      - name: Cargo build (Tauri)
        shell: bash
        run: |
          cargo build --manifest-path apps/desktop/src-tauri/Cargo.toml --release

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: xbclient-desktop-windows
          path: apps/desktop/src-tauri/target/release/xbclient-desktop.exe
          if-no-files-found: warn

  android:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'
          run_install: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-37.0 build-tools;37.0.0 ndk;28.2.13676358'

      - name: Configure Android NDK toolchain
        shell: bash
        run: |
          ndk="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/ndk/28.2.13676358"
          echo "ANDROID_NDK_HOME=$ndk" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang" >> "$GITHUB_ENV"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-android-${{ hashFiles('apps/desktop/src-tauri/Cargo.toml', 'rust/aerion-core/Cargo.toml') }}
          restore-keys: cargo-android-

      - name: Install web deps
        shell: bash
        run: |
          pnpm install --frozen-lockfile=false

      - name: Type-check web
        shell: bash
        run: |
          pnpm --filter xbclient-web typecheck

      - name: Build web
        shell: bash
        run: |
          pnpm --filter xbclient-web build

      - name: Cargo check (Tauri Android)
        shell: bash
        run: |
          cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --target aarch64-linux-android --release

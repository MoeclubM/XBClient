name: Release Builds

run-name: Release Builds · ${{ github.ref_name }} · @${{ github.actor }} · #${{ github.run_number }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Android release APK/AAB
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      XBCLIENT_DEFAULT_API_URL: ${{ secrets.XBCLIENT_DEFAULT_API_URL }}
      XBCLIENT_APP_NAME: ${{ secrets.XBCLIENT_APP_NAME }}
      XBCLIENT_APPLICATION_ID: ${{ secrets.XBCLIENT_APPLICATION_ID }}
      XBCLIENT_ADMOB_APP_ID: ${{ secrets.XBCLIENT_ADMOB_APP_ID }}
      XBCLIENT_USER_AGENT: ${{ secrets.XBCLIENT_USER_AGENT }}
      XBCLIENT_BUILTIN_DNS_SERVER: ${{ secrets.XBCLIENT_BUILTIN_DNS_SERVER }}
      XBCLIENT_OAUTH_CALLBACK_SCHEME: ${{ secrets.XBCLIENT_OAUTH_CALLBACK_SCHEME }}
      XBCLIENT_WEBSITE_URL: ${{ secrets.XBCLIENT_WEBSITE_URL }}
      XBCLIENT_PRIVACY_POLICY_URL: ${{ secrets.XBCLIENT_PRIVACY_POLICY_URL }}
      XBCLIENT_USER_AGREEMENT_URL: ${{ secrets.XBCLIENT_USER_AGREEMENT_URL }}
      XBCLIENT_RELEASE_STORE_FILE: app/config/release-signing.jks
      XBCLIENT_RELEASE_STORE_BASE64: ${{ secrets.XBCLIENT_RELEASE_STORE_BASE64 }}
      XBCLIENT_RELEASE_STORE_PASSWORD: ${{ secrets.XBCLIENT_RELEASE_STORE_PASSWORD }}
      XBCLIENT_RELEASE_KEY_ALIAS: ${{ secrets.XBCLIENT_RELEASE_KEY_ALIAS }}
      XBCLIENT_RELEASE_KEY_PASSWORD: ${{ secrets.XBCLIENT_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-36 build-tools;36.1.0 ndk;28.2.13676358'

      - name: Prepare local.properties
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\n' "$sdk_root" > local.properties

      - name: Validate app build secrets
        shell: bash
        run: |
          for name in XBCLIENT_DEFAULT_API_URL XBCLIENT_ADMOB_APP_ID XBCLIENT_USER_AGENT XBCLIENT_OAUTH_CALLBACK_SCHEME; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty or not available to this workflow"
              exit 1
            fi
          done

      - name: Prepare release keystore
        shell: bash
        run: |
          for name in XBCLIENT_RELEASE_STORE_BASE64 XBCLIENT_RELEASE_STORE_PASSWORD XBCLIENT_RELEASE_KEY_ALIAS XBCLIENT_RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty or not available to this workflow"
              exit 1
            fi
          done
          mkdir -p "$(dirname "$XBCLIENT_RELEASE_STORE_FILE")"
          printf '%s' "$XBCLIENT_RELEASE_STORE_BASE64" | base64 -d > "$XBCLIENT_RELEASE_STORE_FILE"

      - name: Verify shared release signing certificate
        shell: bash
        run: |
          keytool -list -v \
            -keystore "$XBCLIENT_RELEASE_STORE_FILE" \
            -storepass "$XBCLIENT_RELEASE_STORE_PASSWORD" \
            -alias "$XBCLIENT_RELEASE_KEY_ALIAS" \
            | grep -E 'Alias name:|SHA256:'

      - name: Set up Rust Android targets
        shell: bash
        run: |
          rustup target add \
            aarch64-linux-android \
            x86_64-linux-android

      - name: Build signed release APKs and AAB
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease --build-cache --stacktrace

      - name: Upload release arm64-v8a APK
        uses: actions/upload-artifact@v6
        with:
          name: xbclient-release-arm64-v8a-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: error

      - name: Upload release x86_64 APK
        uses: actions/upload-artifact@v6
        with:
          name: xbclient-release-x86_64-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-x86_64-release.apk
          if-no-files-found: error

      - name: Upload release universal APK
        uses: actions/upload-artifact@v6
        with:
          name: xbclient-release-universal-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-universal-release.apk
          if-no-files-found: error

      - name: Upload release AAB
        uses: actions/upload-artifact@v6
        with:
          name: xbclient-release-aab-${{ github.ref_name }}
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Set up Node.js for Tauri Android
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install pnpm
        shell: bash
        run: |
          npm install -g pnpm@10.20.0
          pnpm install --frozen-lockfile=false

      - name: Build signed Tauri release APKs and AAB
        shell: bash
        run: |
          pnpm --filter xbclient-tauri android:build --apk --aab --split-per-abi --target aarch64 x86_64 --ci

      - name: Collect Tauri release Android artifacts
        shell: bash
        run: |
          mkdir -p artifacts/tauri-android/apk artifacts/tauri-android/aab
          find apps/tauri/src-tauri/gen/android/app/build/outputs/apk -name '*.apk' -print0 \
            | while IFS= read -r -d '' file; do cp "$file" "artifacts/tauri-android/apk/tauri-$(basename "$file")"; done
          find apps/tauri/src-tauri/gen/android/app/build/outputs/bundle -name '*.aab' -print0 \
            | while IFS= read -r -d '' file; do cp "$file" "artifacts/tauri-android/aab/tauri-$(basename "$file")"; done

      - name: Upload release Tauri Android APKs
        uses: actions/upload-artifact@v6
        with:
          name: xbclient-tauri-release-android-apks-${{ github.ref_name }}
          path: artifacts/tauri-android/apk/*.apk
          if-no-files-found: error

      - name: Upload release Tauri Android AABs
        uses: actions/upload-artifact@v6
        with:
          name: xbclient-tauri-release-android-aabs-${{ github.ref_name }}
          path: artifacts/tauri-android/aab/*.aab
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
            artifacts/tauri-android/apk/*.apk
            artifacts/tauri-android/aab/*.aab
          generate_release_notes: true

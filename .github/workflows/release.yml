name: Release Builds

run-name: Release Builds · ${{ github.ref_name }} · @${{ github.actor }} · #${{ github.run_number }}

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      XBCLIENT_DEFAULT_API_URL: ${{ secrets.XBCLIENT_DEFAULT_API_URL }}
      XBCLIENT_APP_NAME: ${{ secrets.XBCLIENT_APP_NAME }}
      XBCLIENT_ADMOB_APP_ID: ${{ secrets.XBCLIENT_ADMOB_APP_ID }}
      XBCLIENT_USER_AGENT: ${{ secrets.XBCLIENT_USER_AGENT }}
      XBCLIENT_RELEASE_STORE_PASSWORD: ${{ secrets.XBCLIENT_RELEASE_STORE_PASSWORD }}
      XBCLIENT_RELEASE_KEY_PASSWORD: ${{ secrets.XBCLIENT_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-37.0 build-tools;37.0.0 ndk;28.2.13676358'

      - name: Prepare local.properties
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\n' "$sdk_root" > local.properties

      - name: Set up Rust Android targets
        shell: bash
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Build signed release APKs
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --build-cache --stacktrace

      - name: Upload release arm64-v8a APK
        uses: actions/upload-artifact@v6
        with:
          name: xbclient-release-arm64-v8a-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: error

      - name: Upload release armeabi-v7a APK
        uses: actions/upload-artifact@v6
        with:
          name: xbclient-release-armeabi-v7a-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-armeabi-v7a-release.apk
          if-no-files-found: error

      - name: Upload release x86 APK
        uses: actions/upload-artifact@v6
        with:
          name: xbclient-release-x86-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-x86-release.apk
          if-no-files-found: error

      - name: Upload release x86_64 APK
        uses: actions/upload-artifact@v6
        with:
          name: xbclient-release-x86_64-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-x86_64-release.apk
          if-no-files-found: error

      - name: Upload release universal APK
        uses: actions/upload-artifact@v6
        with:
          name: xbclient-release-universal-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-universal-release.apk
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
          generate_release_notes: true

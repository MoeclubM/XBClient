name: Release Builds

run-name: Release Builds · ${{ github.ref_name }} · @${{ github.actor }} · #${{ github.run_number }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Android release APK/AAB
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      XBCLIENT_DEFAULT_API_URL: ${{ secrets.XBCLIENT_DEFAULT_API_URL }}
      XBCLIENT_APP_NAME: ${{ secrets.XBCLIENT_APP_NAME }}
      XBCLIENT_APPLICATION_ID: ${{ secrets.XBCLIENT_APPLICATION_ID }}
      XBCLIENT_ADMOB_APP_ID: ${{ secrets.XBCLIENT_ADMOB_APP_ID }}
      XBCLIENT_USER_AGENT: ${{ secrets.XBCLIENT_USER_AGENT }}
      XBCLIENT_BUILTIN_DNS_SERVER: ${{ secrets.XBCLIENT_BUILTIN_DNS_SERVER }}
      XBCLIENT_OAUTH_CALLBACK_SCHEME: ${{ secrets.XBCLIENT_OAUTH_CALLBACK_SCHEME }}
      XBCLIENT_WEBSITE_URL: ${{ secrets.XBCLIENT_WEBSITE_URL }}
      XBCLIENT_PRIVACY_POLICY_URL: ${{ secrets.XBCLIENT_PRIVACY_POLICY_URL }}
      XBCLIENT_USER_AGREEMENT_URL: ${{ secrets.XBCLIENT_USER_AGREEMENT_URL }}
      XBCLIENT_RELEASE_STORE_FILE: app/config/release-signing.jks
      XBCLIENT_RELEASE_STORE_BASE64: ${{ secrets.XBCLIENT_RELEASE_STORE_BASE64 }}
      XBCLIENT_RELEASE_STORE_PASSWORD: ${{ secrets.XBCLIENT_RELEASE_STORE_PASSWORD }}
      XBCLIENT_RELEASE_KEY_ALIAS: ${{ secrets.XBCLIENT_RELEASE_KEY_ALIAS }}
      XBCLIENT_RELEASE_KEY_PASSWORD: ${{ secrets.XBCLIENT_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-36 build-tools;36.1.0 ndk;28.2.13676358'

      - name: Prepare local.properties
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\n' "$sdk_root" > local.properties

      - name: Validate app build secrets
        shell: bash
        run: |
          for name in XBCLIENT_DEFAULT_API_URL XBCLIENT_ADMOB_APP_ID XBCLIENT_USER_AGENT XBCLIENT_OAUTH_CALLBACK_SCHEME; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty or not available to this workflow"
              exit 1
            fi
          done

      - name: Prepare release keystore
        shell: bash
        run: |
          for name in XBCLIENT_RELEASE_STORE_BASE64 XBCLIENT_RELEASE_STORE_PASSWORD XBCLIENT_RELEASE_KEY_ALIAS XBCLIENT_RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty or not available to this workflow"
              exit 1
            fi
          done
          mkdir -p "$(dirname "$XBCLIENT_RELEASE_STORE_FILE")"
          printf '%s' "$XBCLIENT_RELEASE_STORE_BASE64" | base64 -d > "$XBCLIENT_RELEASE_STORE_FILE"

      - name: Verify shared release signing certificate
        shell: bash
        run: |
          keytool -list -v \
            -keystore "$XBCLIENT_RELEASE_STORE_FILE" \
            -storepass "$XBCLIENT_RELEASE_STORE_PASSWORD" \
            -alias "$XBCLIENT_RELEASE_KEY_ALIAS" \
            | grep -E 'Alias name:|SHA256:'

      - name: Set up Rust Android targets
        shell: bash
        run: rustup target add aarch64-linux-android

      - name: Build signed release APK and AAB
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease --build-cache --stacktrace

      - name: Upload release Android APK
        uses: actions/upload-artifact@v7
        with:
          name: xbclient-release-android-${{ github.ref_name }}
          archive: false
          path: app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: error

      - name: Upload release Android AAB
        uses: actions/upload-artifact@v7
        with:
          name: xbclient-release-android-aab-${{ github.ref_name }}
          archive: false
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            app/build/outputs/apk/release/app-arm64-v8a-release.apk
            app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true

  windows-electron-release:
    name: Windows Electron release installer
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      XBCLIENT_DEFAULT_API_URL: ${{ secrets.XBCLIENT_DEFAULT_API_URL }}
      XBCLIENT_APP_NAME: ${{ secrets.XBCLIENT_APP_NAME }}
      XBCLIENT_USER_AGENT: ${{ secrets.XBCLIENT_USER_AGENT }}
      XBCLIENT_OAUTH_CALLBACK_SCHEME: ${{ secrets.XBCLIENT_OAUTH_CALLBACK_SCHEME }}
      XBCLIENT_WEBSITE_URL: ${{ secrets.XBCLIENT_WEBSITE_URL }}
      XBCLIENT_PRIVACY_POLICY_URL: ${{ secrets.XBCLIENT_PRIVACY_POLICY_URL }}
      XBCLIENT_USER_AGREEMENT_URL: ${{ secrets.XBCLIENT_USER_AGREEMENT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install pnpm
        shell: bash
        run: npm install -g pnpm@10.20.0

      - name: Set up Rust
        shell: bash
        run: rustup toolchain install stable --profile minimal

      - name: Validate desktop build secrets
        shell: bash
        run: bash scripts/ci/validate-desktop-secrets.sh

      - name: Build Windows installer
        shell: bash
        run: |
          pnpm install --frozen-lockfile=false
          pnpm --filter xbclient-electron dist:win
          rm -f apps/electron/dist/*portable*.exe

      - name: Publish desktop assets to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            apps/electron/dist/latest.yml
            apps/electron/dist/*.blockmap
            apps/electron/dist/*-win-x64.exe

  linux-electron-release-x86_64:
    name: Linux Electron release deb (x86_64)
    runs-on: ubuntu-24.04
    env:
      CARGO_TERM_COLOR: always
      XBCLIENT_LINUX_TARGETS: deb
      XBCLIENT_DEFAULT_API_URL: ${{ secrets.XBCLIENT_DEFAULT_API_URL }}
      XBCLIENT_APP_NAME: ${{ secrets.XBCLIENT_APP_NAME }}
      XBCLIENT_USER_AGENT: ${{ secrets.XBCLIENT_USER_AGENT }}
      XBCLIENT_OAUTH_CALLBACK_SCHEME: ${{ secrets.XBCLIENT_OAUTH_CALLBACK_SCHEME }}
      XBCLIENT_WEBSITE_URL: ${{ secrets.XBCLIENT_WEBSITE_URL }}
      XBCLIENT_PRIVACY_POLICY_URL: ${{ secrets.XBCLIENT_PRIVACY_POLICY_URL }}
      XBCLIENT_USER_AGREEMENT_URL: ${{ secrets.XBCLIENT_USER_AGREEMENT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install pnpm
        shell: bash
        run: npm install -g pnpm@10.20.0

      - name: Set up Rust
        shell: bash
        run: rustup toolchain install stable --profile minimal

      - name: Validate desktop build secrets
        shell: bash
        run: bash scripts/ci/validate-desktop-secrets.sh

      - name: Build Linux deb (x86_64)
        shell: bash
        run: |
          pnpm install --frozen-lockfile=false
          pnpm --filter xbclient-electron dist:linux:deb

      - name: Upload release Linux deb (x86_64)
        uses: actions/upload-artifact@v7
        with:
          name: xbclient-release-linux-x86_64-${{ github.ref_name }}
          archive: false
          path: apps/electron/dist/*.deb
          if-no-files-found: error

      - name: Publish Linux deb (x86_64) to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: apps/electron/dist/*.deb

  linux-electron-release-arm64:
    name: Linux Electron release deb (arm64)
    runs-on: ubuntu-24.04-arm
    env:
      CARGO_TERM_COLOR: always
      XBCLIENT_LINUX_TARGETS: deb
      XBCLIENT_DEFAULT_API_URL: ${{ secrets.XBCLIENT_DEFAULT_API_URL }}
      XBCLIENT_APP_NAME: ${{ secrets.XBCLIENT_APP_NAME }}
      XBCLIENT_USER_AGENT: ${{ secrets.XBCLIENT_USER_AGENT }}
      XBCLIENT_OAUTH_CALLBACK_SCHEME: ${{ secrets.XBCLIENT_OAUTH_CALLBACK_SCHEME }}
      XBCLIENT_WEBSITE_URL: ${{ secrets.XBCLIENT_WEBSITE_URL }}
      XBCLIENT_PRIVACY_POLICY_URL: ${{ secrets.XBCLIENT_PRIVACY_POLICY_URL }}
      XBCLIENT_USER_AGREEMENT_URL: ${{ secrets.XBCLIENT_USER_AGREEMENT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install pnpm
        shell: bash
        run: npm install -g pnpm@10.20.0

      - name: Set up Rust
        shell: bash
        run: rustup toolchain install stable --profile minimal

      - name: Validate desktop build secrets
        shell: bash
        run: bash scripts/ci/validate-desktop-secrets.sh

      - name: Prepare system fpm (arm64)
        shell: bash
        run: bash scripts/ci/setup-linux-arm64-fpm.sh

      - name: Build Linux deb (arm64)
        shell: bash
        env:
          USE_SYSTEM_FPM: true
        run: |
          pnpm install --frozen-lockfile=false
          pnpm --filter xbclient-electron dist:linux:deb

      - name: Upload release Linux deb (arm64)
        uses: actions/upload-artifact@v7
        with:
          name: xbclient-release-linux-arm64-${{ github.ref_name }}
          archive: false
          path: apps/electron/dist/*.deb
          if-no-files-found: error

      - name: Publish Linux deb (arm64) to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: apps/electron/dist/*.deb

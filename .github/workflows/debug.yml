name: Beta Builds

run-name: Beta Builds · ${{ github.head_ref || github.ref_name }} · @${{ github.actor }} · #${{ github.run_number }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: beta-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-beta:
    name: Android beta APK
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      XBCLIENT_DEFAULT_API_URL: ${{ secrets.XBCLIENT_DEFAULT_API_URL }}
      XBCLIENT_APP_NAME: ${{ secrets.XBCLIENT_APP_NAME }}
      XBCLIENT_APPLICATION_ID: ${{ secrets.XBCLIENT_APPLICATION_ID }}
      XBCLIENT_ADMOB_APP_ID: ${{ secrets.XBCLIENT_ADMOB_APP_ID }}
      XBCLIENT_USER_AGENT: ${{ secrets.XBCLIENT_USER_AGENT }}
      XBCLIENT_BUILTIN_DNS_SERVER: ${{ secrets.XBCLIENT_BUILTIN_DNS_SERVER }}
      XBCLIENT_OAUTH_CALLBACK_SCHEME: ${{ secrets.XBCLIENT_OAUTH_CALLBACK_SCHEME }}
      XBCLIENT_WEBSITE_URL: ${{ secrets.XBCLIENT_WEBSITE_URL }}
      XBCLIENT_PRIVACY_POLICY_URL: ${{ secrets.XBCLIENT_PRIVACY_POLICY_URL }}
      XBCLIENT_USER_AGREEMENT_URL: ${{ secrets.XBCLIENT_USER_AGREEMENT_URL }}
      XBCLIENT_RELEASE_STORE_FILE: app/config/release-signing.jks
      XBCLIENT_RELEASE_STORE_BASE64: ${{ secrets.XBCLIENT_RELEASE_STORE_BASE64 }}
      XBCLIENT_RELEASE_STORE_PASSWORD: ${{ secrets.XBCLIENT_RELEASE_STORE_PASSWORD }}
      XBCLIENT_RELEASE_KEY_ALIAS: ${{ secrets.XBCLIENT_RELEASE_KEY_ALIAS }}
      XBCLIENT_RELEASE_KEY_PASSWORD: ${{ secrets.XBCLIENT_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        shell: bash
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --tags origin "${GITHUB_REF}"
          git checkout --detach "${GITHUB_SHA}"

      - name: Use Java 17
        shell: bash
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> "$GITHUB_ENV"
          echo "$JAVA_HOME_17_X64/bin" >> "$GITHUB_PATH"
          java -version

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-36 build-tools;36.1.0 ndk;28.2.13676358'

      - name: Prepare local.properties
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\n' "$sdk_root" > local.properties

      - name: Validate app build secrets
        shell: bash
        run: |
          for name in XBCLIENT_DEFAULT_API_URL XBCLIENT_ADMOB_APP_ID XBCLIENT_USER_AGENT XBCLIENT_OAUTH_CALLBACK_SCHEME; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty or not available to this workflow"
              exit 1
            fi
          done

      - name: Prepare release keystore
        shell: bash
        run: |
          for name in XBCLIENT_RELEASE_STORE_BASE64 XBCLIENT_RELEASE_STORE_PASSWORD XBCLIENT_RELEASE_KEY_ALIAS XBCLIENT_RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty or not available to this workflow"
              exit 1
            fi
          done
          mkdir -p "$(dirname "$XBCLIENT_RELEASE_STORE_FILE")"
          printf '%s' "$XBCLIENT_RELEASE_STORE_BASE64" | base64 -d > "$XBCLIENT_RELEASE_STORE_FILE"

      - name: Verify shared release signing certificate
        shell: bash
        run: |
          keytool -list -v \
            -keystore "$XBCLIENT_RELEASE_STORE_FILE" \
            -storepass "$XBCLIENT_RELEASE_STORE_PASSWORD" \
            -alias "$XBCLIENT_RELEASE_KEY_ALIAS" \
            | grep -E 'Alias name:|SHA256:'

      - name: Set up Rust Android targets
        shell: bash
        run: rustup target add aarch64-linux-android

      - name: Build signed beta APK
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --build-cache --stacktrace

      - name: Upload beta Android APK
        uses: actions/upload-artifact@v7
        with:
          name: xbclient-beta-android-${{ github.run_number }}
          archive: false
          path: app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: error

  windows-beta:
    name: Windows Electron beta installer
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      XBCLIENT_DEFAULT_API_URL: ${{ secrets.XBCLIENT_DEFAULT_API_URL }}
      XBCLIENT_APP_NAME: ${{ secrets.XBCLIENT_APP_NAME }}
      XBCLIENT_USER_AGENT: ${{ secrets.XBCLIENT_USER_AGENT }}
      XBCLIENT_OAUTH_CALLBACK_SCHEME: ${{ secrets.XBCLIENT_OAUTH_CALLBACK_SCHEME }}
      XBCLIENT_WEBSITE_URL: ${{ secrets.XBCLIENT_WEBSITE_URL }}
      XBCLIENT_PRIVACY_POLICY_URL: ${{ secrets.XBCLIENT_PRIVACY_POLICY_URL }}
      XBCLIENT_USER_AGREEMENT_URL: ${{ secrets.XBCLIENT_USER_AGREEMENT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install pnpm
        shell: bash
        run: npm install -g pnpm@10.20.0

      - name: Set up Rust
        shell: bash
        run: rustup toolchain install stable --profile minimal

      - name: Validate desktop build secrets
        shell: bash
        run: bash scripts/ci/validate-desktop-secrets.sh

      - name: Build Windows installer
        shell: bash
        run: |
          pnpm install --frozen-lockfile=false
          pnpm --filter xbclient-electron dist:win
          # Remove portable build so the upload glob resolves to exactly one file (required by upload-artifact@v7 + archive:false)
          find apps/electron/dist -type f -name '*-portable-*.exe' -delete || true

      - name: Upload beta Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: xbclient-beta-windows-${{ github.run_number }}
          archive: false
          path: apps/electron/dist/*-win-x64.exe
          if-no-files-found: error

  linux-beta:
    name: Linux Electron beta deb (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    env:
      CARGO_TERM_COLOR: always
      XBCLIENT_LINUX_TARGETS: deb
      XBCLIENT_DEFAULT_API_URL: ${{ secrets.XBCLIENT_DEFAULT_API_URL }}
      XBCLIENT_APP_NAME: ${{ secrets.XBCLIENT_APP_NAME }}
      XBCLIENT_USER_AGENT: ${{ secrets.XBCLIENT_USER_AGENT }}
      XBCLIENT_OAUTH_CALLBACK_SCHEME: ${{ secrets.XBCLIENT_OAUTH_CALLBACK_SCHEME }}
      XBCLIENT_WEBSITE_URL: ${{ secrets.XBCLIENT_WEBSITE_URL }}
      XBCLIENT_PRIVACY_POLICY_URL: ${{ secrets.XBCLIENT_PRIVACY_POLICY_URL }}
      XBCLIENT_USER_AGREEMENT_URL: ${{ secrets.XBCLIENT_USER_AGREEMENT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install pnpm
        shell: bash
        run: npm install -g pnpm@10.20.0

      - name: Set up Rust
        shell: bash
        run: rustup toolchain install stable --profile minimal

      - name: Validate desktop build secrets
        shell: bash
        run: bash scripts/ci/validate-desktop-secrets.sh

      - name: Prepare system fpm (arm64)
        if: matrix.arch == 'arm64'
        shell: bash
        run: bash scripts/ci/setup-linux-arm64-fpm.sh

      # arm64 builds use the system fpm installed above (exported via
      # $GITHUB_ENV by setup-linux-arm64-fpm.sh); x86_64 lets electron-builder
      # fetch its own fpm, so USE_SYSTEM_FPM must stay unset there.
      - name: Build Linux deb
        shell: bash
        run: |
          pnpm install --frozen-lockfile=false
          pnpm --filter xbclient-electron dist:linux:deb

      - name: Upload beta Linux deb
        uses: actions/upload-artifact@v7
        with:
          name: xbclient-beta-linux-${{ matrix.arch }}-${{ github.run_number }}
          archive: false
          path: apps/electron/dist/*.deb
          if-no-files-found: error

name: CI

run-name: CI · ${{ github.head_ref || github.ref_name }} · @${{ github.actor }} · #${{ github.run_number }}

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      XBCLIENT_DEFAULT_API_URL: ${{ secrets.XBCLIENT_DEFAULT_API_URL }}
      XBCLIENT_APP_NAME: ${{ secrets.XBCLIENT_APP_NAME }}
      XBCLIENT_ADMOB_APP_ID: ${{ secrets.XBCLIENT_ADMOB_APP_ID }}
      XBCLIENT_RELEASE_STORE_PASSWORD: ${{ secrets.XBCLIENT_RELEASE_STORE_PASSWORD }}
      XBCLIENT_RELEASE_KEY_PASSWORD: ${{ secrets.XBCLIENT_RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-37.0 build-tools;37.0.0 ndk;28.2.13676358'

      - name: Prepare local.properties
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\n' "$sdk_root" > local.properties

      - name: Set up Rust Android targets
        shell: bash
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            i686-linux-android \
            x86_64-linux-android

      - name: Check Rust core
        shell: bash
        run: |
          cd rust/xbclient-core
          cargo fmt --check
          cargo check
          cargo test

      - name: Build signed debug APK
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --build-cache --stacktrace

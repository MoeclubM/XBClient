name: CI

run-name: CI · ${{ github.head_ref || github.ref_name }} · @${{ github.actor }} · #${{ github.run_number }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android native and Tauri Android
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      XBCLIENT_DEFAULT_API_URL: ${{ secrets.XBCLIENT_DEFAULT_API_URL }}
      XBCLIENT_APP_NAME: ${{ secrets.XBCLIENT_APP_NAME }}
      XBCLIENT_APPLICATION_ID: ${{ secrets.XBCLIENT_APPLICATION_ID }}
      XBCLIENT_ADMOB_APP_ID: ${{ secrets.XBCLIENT_ADMOB_APP_ID }}
      XBCLIENT_USER_AGENT: ${{ secrets.XBCLIENT_USER_AGENT }}
      XBCLIENT_BUILTIN_DNS_SERVER: ${{ secrets.XBCLIENT_BUILTIN_DNS_SERVER }}
      XBCLIENT_OAUTH_CALLBACK_SCHEME: ${{ secrets.XBCLIENT_OAUTH_CALLBACK_SCHEME }}
      XBCLIENT_WEBSITE_URL: ${{ secrets.XBCLIENT_WEBSITE_URL }}
      XBCLIENT_PRIVACY_POLICY_URL: ${{ secrets.XBCLIENT_PRIVACY_POLICY_URL }}
      XBCLIENT_USER_AGREEMENT_URL: ${{ secrets.XBCLIENT_USER_AGREEMENT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-36 build-tools;36.1.0 ndk;28.2.13676358'

      - name: Prepare local.properties
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\n' "$sdk_root" > local.properties

      - name: Validate app build secrets
        shell: bash
        run: |
          for name in XBCLIENT_DEFAULT_API_URL XBCLIENT_APP_NAME XBCLIENT_ADMOB_APP_ID XBCLIENT_USER_AGENT XBCLIENT_OAUTH_CALLBACK_SCHEME; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty or not available to this workflow"
              exit 1
            fi
          done

      - name: Check Rust core
        shell: bash
        run: |
          cd rust/aerion-core
          cargo fmt --check
          cargo check
          cargo test

      - name: Compile Android Kotlin
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew :app:compileDebugKotlin --build-cache --stacktrace

      - name: Install pnpm
        shell: bash
        run: |
          npm install -g pnpm@10.20.0

      - name: Build Tauri web
        shell: bash
        run: |
          pnpm install --frozen-lockfile=false
          pnpm --filter xbclient-web typecheck
          pnpm --filter xbclient-web build

      - name: Set up Tauri Android target
        shell: bash
        run: |
          rustup target add aarch64-linux-android

      - name: Configure Tauri Android NDK toolchain
        shell: bash
        run: |
          ndk="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/ndk/28.2.13676358"
          echo "ANDROID_NDK_HOME=$ndk" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ndk/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang" >> "$GITHUB_ENV"

      - name: Check Tauri Android
        shell: bash
        run: |
          cargo check --manifest-path apps/tauri/src-tauri/Cargo.toml --target aarch64-linux-android --release

      - name: Build Tauri Android debug APK
        shell: bash
        run: |
          pnpm --filter xbclient-tauri android:build --apk --target aarch64 --debug --ci

  windows-tauri:
    name: Windows app
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      XBCLIENT_DEFAULT_API_URL: ${{ secrets.XBCLIENT_DEFAULT_API_URL }}
      XBCLIENT_APP_NAME: ${{ secrets.XBCLIENT_APP_NAME }}
      XBCLIENT_USER_AGENT: ${{ secrets.XBCLIENT_USER_AGENT }}
      XBCLIENT_OAUTH_CALLBACK_SCHEME: ${{ secrets.XBCLIENT_OAUTH_CALLBACK_SCHEME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install pnpm
        shell: bash
        run: |
          npm install -g pnpm@10.20.0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install web deps
        shell: bash
        run: |
          pnpm install --frozen-lockfile=false

      - name: Type-check web
        shell: bash
        run: |
          pnpm --filter xbclient-web typecheck

      - name: Build web
        shell: bash
        run: |
          pnpm --filter xbclient-web build

      - name: Check Tauri Windows
        shell: bash
        run: |
          cargo check --manifest-path apps/tauri/src-tauri/Cargo.toml --release

      - name: Build Tauri Windows
        shell: bash
        run: |
          pnpm --filter xbclient-tauri build
